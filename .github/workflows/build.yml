name: build

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/boudreaux-labs/APP_NAME:latest
            ghcr.io/boudreaux-labs/APP_NAME:${{ github.sha }}

      - name: Update deployment image tag
        run: |
          sed -i "s|ghcr.io/boudreaux-labs/APP_NAME:.*|ghcr.io/boudreaux-labs/APP_NAME:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push

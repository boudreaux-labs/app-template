name: build

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/boudreaux-labs/APP_NAME:latest
            ghcr.io/boudreaux-labs/APP_NAME:${{ github.sha }}

      - name: Update deployment image tag
        run: |
          sed -i "s|ghcr.io/boudreaux-labs/APP_NAME:.*|ghcr.io/boudreaux-labs/APP_NAME:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
